name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'

env:
  PROJECT_ID: remitos-backend
  REGION: southamerica-east1
  REPOSITORY: remitos
  IMAGE_NAME: server
  SERVICE_NAME: remitos-api
  SERVICE_ACCOUNT: backend-service@remitos-backend.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/865349418409/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: backend/go.sum

    - name: Run Tests
      run: go test ./... -v

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: 'access_token'
        workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
        service_account: '${{ env.SERVICE_ACCOUNT }}'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Auth
      id: docker-auth
      uses: docker/login-action@v3
      with:
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'
        registry: '${{ env.REGION }}-docker.pkg.dev'

    - name: Build and Push Container
      run: |
        IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
        docker build -t ${IMAGE_URL}:latest .
        docker push ${IMAGE_URL}:latest

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: '${{ env.SERVICE_NAME }}'
        region: '${{ env.REGION }}'
        image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest'
        service_account: '${{ env.SERVICE_ACCOUNT }}'
        # By not specifying env_vars here, it preserves the existing ones set in Cloud Run
        # By not specifying secrets here, it preserves the existing DB_PASSWORD and JWT_SECRET bindings
